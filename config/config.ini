# ==============================================================================
# FICHIER DE CONFIGURATION CENTRAL POUR ALPHA-EVOLVER
# ==============================================================================
# Ce fichier pilote l'ensemble du processus d'optimisation de code.
# Modifiez les valeurs ci-dessous pour adapter le comportement de l'outil
# à votre projet et à vos besoins.

[paths]
# Chemin vers le répertoire contenant le code source à optimiser.
# Le chemin doit être accessible depuis l'endroit où vous lancez le script.
# Par défaut, nous supposons un répertoire 'source_code' à la racine du projet.
source_directory = /root/projets

# Chemin vers le répertoire où le code amélioré et les rapports seront sauvegardés.
output_directory = output/

# Chemin vers le répertoire pour stocker les fichiers de log.
log_directory = logs/


[llm]
# ------------------------------------------------------------------------------
# CHOIX DU FOURNISSEUR DE LLM
# ------------------------------------------------------------------------------
# Choisissez le service à utiliser pour la génération de code.
# Options valides: "ollama", "openai", "huggingface", "openrouter"
provider = ollama

# --- Configuration pour Ollama (si provider = ollama) ---
# Nom du modèle tel que spécifié dans Ollama (ex: "llama3:8b", "gemma:2b").
# Assurez-vous que le modèle est bien installé avec `ollama pull <model_name>`.
ollama_model = gemma:2b
# URL de base de votre instance Ollama.
ollama_base_url = http://localhost:11434

# --- Configuration pour OpenAI (si provider = openai) ---
# Nom du modèle à utiliser (ex: "gpt-4-turbo", "gpt-3.5-turbo").
openai_model = gpt-4-turbo
# Votre clé API OpenAI. Laissez vide si vous utilisez une variable d'environnement (OPENAI_API_KEY).
openai_api_key =

# --- Configuration pour OpenRouter (si provider = openrouter) ---
# Nom du modèle sur OpenRouter (ex: "google/gemma-7b-it", "mistralai/mistral-7b-instruct").
openrouter_model = google/gemma-7b-it
# Votre clé API OpenRouter. Laissez vide si vous utilisez une variable d'environnement (OPENROUTER_API_KEY).
openrouter_api_key =

# --- Paramètres de génération du LLM ---
# Température : contrôle le degré de "créativité" du modèle.
# Des valeurs plus basses (ex: 0.2) rendent les réponses plus déterministes.
# Des valeurs plus hautes (ex: 0.8) les rendent plus variées.
temperature = 0.4
# Nombre maximum de tokens à générer dans une réponse.
max_tokens = 2048


[evolution]
# ------------------------------------------------------------------------------
# PARAMÈTRES DE L'ALGORITHME ÉVOLUTIF
# ------------------------------------------------------------------------------
# Nombre de générations. Chaque génération tente d'améliorer la précédente.
# C'est le nombre de cycles complets de "génération -> test -> sélection".
generations = 5

# Nombre de variations de code à générer à chaque génération.
# Un nombre plus élevé explore plus de possibilités, mais prend plus de temps.
variations_per_generation = 10

# Objectif de l'optimisation.
# C'est l'instruction qui sera donnée au LLM pour modifier le code.
# Soyez aussi précis que possible.
optimization_prompt = "Refactorise le code suivant pour le rendre plus performant et plus lisible, tout en conservant exactement le même comportement. Améliore les algorithmes si possible. Ajoute des commentaires pertinents si nécessaire."


[fitness]
# ------------------------------------------------------------------------------
# FONCTION DE FITNESS : COMMENT MESURER L'AMÉLIORATION
# ------------------------------------------------------------------------------
# C'est la partie la plus importante. Elle définit comment le système
# évalue si une variation de code est une "amélioration".

# Commande à exécuter pour tester une variation de code.
# Le système s'attend à ce que cette commande retourne un code de sortie 0
# en cas de succès (tous les tests passent) et un code non nul en cas d'échec.
# Exemples : "pytest", "python -m unittest discover", "./run_tests.sh"
test_command = pytest

# Objectif de l'optimisation.
# Que cherchons-nous à améliorer, en plus de la réussite des tests ?
# Options valides:
#   - "pass_rate": L'objectif est simplement de passer les tests (utile pour la correction de bugs).
#   - "execution_time": L'objectif est de passer les tests le plus rapidement possible.
goal = execution_time


[reporting]
# ------------------------------------------------------------------------------
# GÉNÉRATION DES DOCUMENTS DE SORTIE
# ------------------------------------------------------------------------------
# Activez (yes) ou désactivez (no) la génération des différents fichiers
# de rapport à la fin du processus.

# Générer un rapport final en Markdown qui résume le processus et les résultats.
generate_summary_report = yes

# Générer un fichier diff montrant les changements entre le code original et le code final.
generate_diff_file = yes
